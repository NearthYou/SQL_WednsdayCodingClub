name: CI

on:
  push:
    branches:
      - main
      - "feat-*"
      - "fix-*"
      - "refactor-*"
      - "docs-*"
      - "test-*"
  pull_request:

permissions:
  contents: read

jobs:
  linux-build-and-test:
    name: Linux (${{ matrix.compiler }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - gcc
          - clang

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y make gcc clang

      - name: Build binaries
        run: make clean all CC=${{ matrix.compiler }}

      - name: Run tests
        run: make test CC=${{ matrix.compiler }}

      - name: Run sample queries
        run: |
          cp -R data data_tmp
          ./sql_processor queries/insert_users.sql data_tmp
          ./sql_processor queries/select_users.sql data_tmp

  windows-build-and-test:
    name: Windows (MinGW)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MSYS2 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            make
            mingw-w64-x86_64-gcc

      - name: Build binaries
        run: make clean all

      - name: Run tests
        run: make test

      - name: Run sample queries
        run: |
          cp -R data data_tmp
          ./sql_processor queries/insert_users.sql data_tmp
          ./sql_processor queries/select_users.sql data_tmp
